<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>진도군 노지 ICT</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"
  />

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    #controls {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
    }

    #controls button {
      display: inline-block;
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      background: #ffffff;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
    }

    #controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
    }

    #controls .button-row {
      display: flex;
      gap: 8px;
    }

    #controls button {
      display: inline-block;
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      background: #ffffff;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
    }

    #controls button:hover {
      background: #f4f4f4;
    }

    .leaflet-tooltip.drawn-polygon-label {
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <div id="controls">
    <div class="button-row">
      <button id="save-polygons-btn" type="button">폴리곤 저장</button>
      <button id="load-polygons-btn" type="button">폴리곤 불러오기</button>
    </div>
    <div class="button-row">
      <button id="export-btn" type="button">주소 엑셀로 내보내기</button>
    </div>
    <input id="load-polygons-input" type="file" accept="application/json" style="display:none" />
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>

  <script src="./main.js"></script>
</body>
</html>
